name: Update Bilibili Data

on:
  schedule:
    # 00:00 Pacific Time = 08:00 UTC (PST+8) / 07:00 UTC (PDT+7)
    # Using 07:00 UTC to cover PDT; adjust if needed
    - cron: '0 7 * * *'
  workflow_dispatch: # Allow manual trigger

permissions:
  contents: write

jobs:
  update-bilibili:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Fetch Bilibili data
        run: |
          set -e

          VMID="1492647738"

          echo "Fetching relation stats..."
          RELATION=$(curl -s "https://api.bilibili.com/x/relation/stat?vmid=${VMID}")

          echo "Fetching account info..."
          ACC_INFO=$(curl -s "https://api.bilibili.com/x/space/acc/info?mid=${VMID}")

          echo "Fetching video archive..."
          ARC_SEARCH=$(curl -s "https://api.bilibili.com/x/space/arc/search?mid=${VMID}&ps=1")

          # Parse data using jq
          FOLLOWER=$(echo "$RELATION" | jq -r '.data.follower // 0')
          FOLLOWING=$(echo "$RELATION" | jq -r '.data.following // 0')

          NAME=$(echo "$ACC_INFO" | jq -r '.data.name // "Little_100"')
          FACE=$(echo "$ACC_INFO" | jq -r '.data.face // ""')
          SIGN=$(echo "$ACC_INFO" | jq -r '.data.sign // ""')
          LEVEL=$(echo "$ACC_INFO" | jq -r '.data.level // 0')

          VIP_STATUS=$(echo "$ACC_INFO" | jq -r '.data.vip.status // 0')
          VIP_LABEL=$(echo "$ACC_INFO" | jq -r '.data.vip.label.text // ""')
          VIP_FLAG="false"
          if [ "$VIP_STATUS" = "1" ]; then
            VIP_FLAG="true"
          fi

          LIVE_ROOMID=$(echo "$ACC_INFO" | jq -r '.data.live_room.roomid // 0')
          LIVE_TITLE=$(echo "$ACC_INFO" | jq -r '.data.live_room.title // ""')
          LIVE_STATUS=$(echo "$ACC_INFO" | jq -r '.data.live_room.liveStatus // 0')

          VIDEO_COUNT=$(echo "$ARC_SEARCH" | jq -r '.data.page.count // 0')

          # Get category breakdown from tlist
          GAMING=$(echo "$ARC_SEARCH" | jq -r '[.data.list.tlist // {} | to_entries[] | select(.value.tid == 4 or .value.tid == 17 or .value.tid == 236) | .value.count | tonumber] | add // 0')
          TECH=$(echo "$ARC_SEARCH" | jq -r '[.data.list.tlist // {} | to_entries[] | select(.value.tid == 188) | .value.count | tonumber] | add // 0')
          LIFE=$(echo "$ARC_SEARCH" | jq -r '[.data.list.tlist // {} | to_entries[] | select(.value.tid == 160) | .value.count | tonumber] | add // 0')
          ANIMALS=$(echo "$ARC_SEARCH" | jq -r '[.data.list.tlist // {} | to_entries[] | select(.value.tid == 217) | .value.count | tonumber] | add // 0')

          UPDATED_AT=$(date -u +"%Y-%m-%dT%H:%M:%SZ")

          # Write JSON
          cat > data/bilibili.json << EOF
          {
            "uid": ${VMID},
            "name": "${NAME}",
            "face": "${FACE}",
            "sign": $(echo "$SIGN" | jq -Rs .),
            "level": ${LEVEL},
            "vip": ${VIP_FLAG},
            "vip_label": "${VIP_LABEL}",
            "follower": ${FOLLOWER},
            "following": ${FOLLOWING},
            "video_count": ${VIDEO_COUNT},
            "categories": {
              "gaming": ${GAMING},
              "tech": ${TECH},
              "life": ${LIFE},
              "animals": ${ANIMALS}
            },
            "live_room": {
              "roomid": ${LIVE_ROOMID},
              "title": $(echo "$LIVE_TITLE" | jq -Rs .),
              "liveStatus": ${LIVE_STATUS}
            },
            "updated_at": "${UPDATED_AT}"
          }
          EOF

          # Pretty-print the JSON
          cat data/bilibili.json | jq . > data/bilibili_tmp.json && mv data/bilibili_tmp.json data/bilibili.json

          echo "Done! Data saved to data/bilibili.json"
          cat data/bilibili.json

      - name: Commit and push if changed
        run: |
          cd $GITHUB_WORKSPACE
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/bilibili.json
          if git diff --cached --quiet; then
            echo "No changes detected."
          else
            git commit -m "chore: update Bilibili data [$(date -u +%Y-%m-%d)]"
            git push
          fi
